<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SalonLedger - Login</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    overflow:hidden;
}

/* ================= LEFT PANEL ================= */

.left-panel{
    width:50%;
    background:linear-gradient(135deg,#111827,#4f46e5);
    color:white;
    padding:50px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    position:relative;
    overflow:hidden;
}

/* Decorative circles */
.left-panel::before{
    content:"";
    position:absolute;
    width:250px;
    height:250px;
    background:rgba(255,255,255,0.08);
    border-radius:50%;
    top:-80px;
    right:-80px;
}

.left-panel::after{
    content:"";
    position:absolute;
    width:180px;
    height:180px;
    background:rgba(255,255,255,0.08);
    border-radius:50%;
    bottom:-50px;
    left:-50px;
}

/* Website name */
.brand-header{
    position:absolute;
    top:30px;
    left:40px;
    font-size:26px;
    font-weight:700;
    letter-spacing:1px;
}

/* Logo */
.logo-section{
    text-align:center;
    z-index:2;
}

.logo-circle{
    width:130px;
    height:130px;
    background:white;
    border-radius:50%;
    margin:auto;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:60px;
    color:#4f46e5;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.logo-title{
    font-size:42px;
    font-weight:bold;
    margin-top:20px;
}

.tagline{
    font-size:18px;
    opacity:0.9;
    margin-top:10px;
    margin-bottom:30px;
}

/* Feature cards */
.feature-card{
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(8px);
    border-radius:12px;
    padding:12px 15px;
    margin-bottom:12px;
    display:flex;
    align-items:center;
}

.feature-card i{
    font-size:24px;
    margin-right:12px;
    color:#c7d2fe;
}

/* ================= RIGHT PANEL ================= */

.right-panel{
    width:50%;
    display:flex;
    justify-content:center;
    align-items:center;

    background:
    linear-gradient(
    rgba(248,250,252,0.95),
    rgba(248,250,252,0.95)),
    url('https://images.unsplash.com/photo-1560066984-138dadb4c035');

    background-size:cover;
    background-position:center;
}

/* Login Card */

.login-box{
    width:420px;
    background:white;
    border-radius:20px;
    padding:35px;
    box-shadow:0 15px 40px rgba(0,0,0,0.15);

    animation:slideUp .7s ease;
}

@keyframes slideUp{
    from{
        opacity:0;
        transform:translateY(40px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.login-icon{
    font-size:65px;
    color:#4f46e5;
}

.login-title{
    font-weight:700;
}

.input-group-text{
    background:#eef2ff;
    color:#4f46e5;
    border:none;
}

.form-control{
    border-left:none;
    padding:12px;
}

.form-control:focus{
    box-shadow:none;
}

.btn-login{
    background:#4f46e5;
    color:white;
    padding:12px;
    font-weight:600;
    border:none;
    border-radius:10px;
}

.btn-login:hover{
    background:#3730a3;
    color:white;
}

.small-text{
    color:#64748b;
    font-size:14px;
}

/* Responsive */

@media(max-width:992px){

    .left-panel{
        display:none;
    }

    .right-panel{
        width:100%;
    }

}

</style>
</head>

<body>

<!-- ================= LEFT PANEL ================= -->

<div class="left-panel">

<div class="brand-header">
    💇 SalonLedger
</div>

<div class="logo-section">

<div class="logo-circle">
    ✂️
</div>

<h1 class="logo-title">SalonLedger</h1>

<p class="tagline">
    Smart Financial Management for Modern Salons
</p>

<div class="feature-card">
    <i class="bi bi-cash-stack"></i>
    <span>Track Daily Income & Expenses</span>
</div>

<div class="feature-card">
    <i class="bi bi-graph-up-arrow"></i>
    <span>Monitor Daily & Monthly Profit</span>
</div>

<div class="feature-card">
    <i class="bi bi-bullseye"></i>
    <span>Set Financial Goals & Targets</span>
</div>

<div class="feature-card">
    <i class="bi bi-bar-chart-line"></i>
    <span>Generate Smart Financial Reports</span>
</div>

</div>

</div>

<!-- ================= RIGHT PANEL ================= -->

<div class="right-panel">

<div class="login-box">

<div class="text-center">

<div class="login-icon">
    <i class="bi bi-person-circle"></i>
</div>

<h3 class="login-title mt-2">
    Welcome Back
</h3>

<p class="small-text">
    Login to continue managing your salon finances
</p>

</div>

<!-- Email -->

<div class="input-group mb-3 mt-4">
<span class="input-group-text">
<i class="bi bi-envelope-fill"></i>
</span>

<input
id="email"
type="email"
class="form-control"
placeholder="Enter Email">
</div>

<!-- Password -->

<div class="input-group mb-4">
<span class="input-group-text">
<i class="bi bi-lock-fill"></i>
</span>

<input
id="password"
type="password"
class="form-control"
placeholder="Enter Password">
</div>

<button class="btn btn-login w-100" onclick="login()">
Login
</button>

<hr>

<p class="text-center mb-0">
Don't have an account?
<a href="register.html">Register</a>
</p>

</div>

</div>

<script>
function login(){

    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    if(email === "" || password === ""){
        alert("Please enter email and password");
        return;
    }

    // Redirect to dashboard
    window.location.href = "dashboard.html";
}
</script>

</body>
</html>
