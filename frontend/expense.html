<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salon Expenses System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { background:#f5f7fb; }

.category-card {
    background:white;
    border-radius:15px;
    padding:15px;
    box-shadow:0 2px 12px rgba(0,0,0,0.1);
    cursor:pointer;
    text-align:center;
    transition: transform 0.2s ease;
}

.category-card:hover { transform:scale(1.03); }

.service-box {
    background:#fff;
    padding:10px;
    border-radius:10px;
    margin:5px 0;
    border:1px solid #eee;
    cursor:pointer;
}

.service-box.active {
    background:#dc2626;
    color:white;
}

.right-box {
    background:white;
    padding:15px;
    border-radius:15px;
}

.table-box {
    background:white;
    padding:15px;
    border-radius:15px;
    margin-top:20px;
}
</style>
</head>

<body>

<div class="container mt-4">
    <div class="mb-3">
        <a href="dashboard.html" class="btn btn-secondary btn-sm">⬅ Back to Dashboard</a>
    </div>

    <div class="row">
        <div class="col-md-8">
            <h3>💸 Salon Expense Dashboard</h3>

            <div class="row mt-3">
                <div class="col-md-4">
                    <div class="category-card" onclick="selectCategory('inventory')">🧴 Inventories</div>
                </div>
                <div class="col-md-4">
                    <div class="category-card" onclick="selectCategory('bills')">🧾 Bills</div>
                </div>
                <div class="col-md-4">
                    <div class="category-card" onclick="selectCategory('others')">🍔 Others</div>
                </div>
            </div>

            <div class="mt-4">
                <h5>Select Expense Type</h5>
                <div id="services"></div>
                <input id="amount" type="number" class="form-control mt-2" placeholder="Amount (Rs.)">
                <button class="btn btn-danger mt-3" onclick="addExpense()">Add Expense</button>
            </div>

            <div class="table-box mt-4">
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>Category</th>
                            <th>Type</th>
                            <th>Amount</th>
                            <th>Date</th>
                        </tr>
                    </thead>
                    <tbody id="table"></tbody>
                </table>
            </div>
        </div>

        <div class="col-md-4">
            <div class="right-box">
                <h5>Expense Chart</h5>
                <canvas id="chart"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
/* ================= GLOBAL SETTINGS ================= */
// Points directly to the function path inside your api folder
const API = "/api/submitdata"; 
let data = [];
let table = document.getElementById("table");
let selectedCategory = "";
let selectedService = "";

const services = {
    inventory: ["Shampoo","Soap","Oils","Hair Colors","Blades","Creams","Facial Items","Makeup Items"],
    bills: ["Water","Electricity","Rent","Internet"],
    others: ["Food","Transport","Other"]
};

/* ================= ACTIONS ================= */
function selectCategory(cat) {
    selectedCategory = cat;
    let html = "";
    services[cat].forEach(s => {
        html += `<div class="service-box" onclick="selectService('${s}', this)">${s}</div>`;
    });
    document.getElementById("services").innerHTML = html;
    selectedService = "";
}

function selectService(service, el) {
    selectedService = service;
    document.querySelectorAll(".service-box").forEach(x => x.classList.remove("active"));
    el.classList.add("active");
}

/* ================= DB READ: FETCH LIVE FROM AZURE ================= */
async function loadExpenses() {
    try {
        let res = await fetch(API);
        if (!res.ok) throw new Error("Could not reach backend API");
        let rawTransactions = await res.json();
        
        // Filter out only the "expense" types dynamically coming from MySQL rows
        data = rawTransactions.filter(item => item.type === "expense");
        render();
    } catch (err) {
        console.error("Database loading exception:", err);
    }
}

/* ================= DB WRITE: SAVE LIVE TO AZURE ================= */
async function addExpense() {
    if (!selectedCategory || !selectedService) {
        alert("Please select both a category and an expense type");
        return;
    }

    let amountInput = document.getElementById("amount").value;
    let amount = Number(amountInput);

    if (!amount || amount <= 0) {
        alert("Please enter a valid transactional amount");
        return;
    }

    // Pull current user session identifier context (falls back to 1 if not explicit)
    const currentUserId = localStorage.getItem("loggedUserId") || 1;

    const payload = {
        action: "addTransaction",
        userId: parseInt(currentUserId),
        type: "expense",
        category: selectedCategory.toUpperCase(),
        amount: amount,
        description: selectedService
    };

    try {
        let res = await fetch(API, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });
        
        let resData = await res.json();
        
        if (resData.success) {
            alert("Expense Recorded Successfully! 📉");
            document.getElementById("amount").value = "";
            // Reload from Azure database immediately to refresh layout
            loadExpenses(); 
        } else {
            alert("Error saving transaction: " + resData.error);
        }
    } catch (err) {
        console.error("Failed to post payload parameters:", err);
        alert("Network communication error.");
    }
}

/* ================= RENDER INTERFACE UI ================= */
function render() {
    table.innerHTML = "";
    if (data.length === 0) {
        table.innerHTML = `<tr><td colspan="4" class="text-center text-muted">No expense records found.</td></tr>`;
        updateChart();
        return;
    }

    data.forEach(i => {
        let cleanDate = i.date ? i.date.split("T")[0] : "Recent";
        table.innerHTML += `
        <tr>
            <td>${i.category}</td>
            <td><span class="badge bg-danger">${i.description || i.type}</span></td>
            <td>Rs. ${Number(i.amount).toFixed(2)}</td>
            <td>${cleanDate}</td>
        </tr>`;
    });

    updateChart();
}

/* ================= CHART CONTROLS ================= */
let chart;
function updateChart() {
    let totals = {};
    data.forEach(i => {
        let key = i.description || i.type || "Other";
        totals[key] = (totals[key] || 0) + Number(i.amount);
    });

    let labels = Object.keys(totals);
    let values = Object.values(totals);

    if (chart) chart.destroy();

    chart = new Chart(document.getElementById("chart"), {
        type: "pie",
        data: {
            labels: labels.length ? labels : ["No Data"],
            datasets: [{
                data: values.length ? values : [1],
                backgroundColor: [
                    '#ff6384', '#36a2eb', '#cc65fe', '#ffce56', '#4bc0c0', '#9966ff', '#ff9f40'
                ]
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { position: 'bottom' }
            }
        }
    });
}

// Automatically sync database status when page displays on screen
window.addEventListener("load", loadExpenses);
</script>

</body>
</html>
