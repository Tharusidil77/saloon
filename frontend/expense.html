<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Salon Expenses</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background:#f5f7fb; }
        .category-card { background:white; border-radius:12px; padding:15px; text-align:center; cursor:pointer; box-shadow:0 2px 8px rgba(0,0,0,0.05); }
        .service-box { background:#fff; padding:10px; border-radius:8px; margin:5px 0; border:1px solid #eee; cursor:pointer; }
        .service-box.active { background:#dc2626; color:white; }
    </style>
</head>
<body>
<div class="container mt-4">
    <div class="mb-3"><a href="dashboard.html" class="btn btn-secondary btn-sm">⬅ Dashboard</a></div>
    <div class="row">
        <div class="col-md-8">
            <h3>💸 Record Salon Expenses</h3>
            <div class="row mt-3">
                <div class="col-md-4"><div class="category-card" onclick="selectCategory('inventory')">🧴 Inventories</div></div>
                <div class="col-md-4"><div class="category-card" onclick="selectCategory('bills')">🧾 Bills</div></div>
                <div class="col-md-4"><div class="category-card" onclick="selectCategory('others')">🍔 Others</div></div>
            </div>

            <div class="mt-4">
                <h5>Select Expense Type</h5>
                <div id="services"></div>
                <input id="amount" type="number" class="form-control mt-2" placeholder="Amount (Rs.)">
                <button class="btn btn-danger mt-3" onclick="addExpense()">Save Expense</button>
            </div>

            <div class="bg-white p-3 rounded shadow-sm mt-4">
                <table class="table">
                    <thead><tr><th>Category</th><th>Type</th><th>Amount</th><th>Date</th><th>Action</th></tr></thead>
                    <tbody id="table"></tbody>
                </table>
            </div>
        </div>
        <div class="col-md-4">
            <div class="bg-white p-3 rounded shadow-sm">
                <h5>Distribution Breakdown</h5>
                <canvas id="chart"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
let data = [];
let selectedCategory = "";
let selectedService = "";
let chart;

const services = {
    inventory: ["Shampoo","Soap","Oils","Hair Colors","Blades","Creams"],
    bills: ["Water","Electricity","Rent","Internet"],
    others: ["Food","Transport","Other"]
};

function selectCategory(cat) {
    selectedCategory = cat;
    let html = "";
    services[cat].forEach(s => { html += `<div class="service-box" onclick="selectService('${s}', this)">${s}</div>`; });
    document.getElementById("services").innerHTML = html;
    selectedService = "";
}

function selectService(service, el) {
    selectedService = service;
    document.querySelectorAll(".service-box").forEach(x => x.classList.remove("active"));
    el.classList.add("active");
}

async function loadExpenses() {
    try {
        const res = await fetch('/api/manageFinance');
        const transactions = await res.json();
        data = transactions.filter(t => t.type === 'expense');
        render();
    } catch (err) { console.error(err); }
}

async function addExpense() {
    const amt = Number(document.getElementById("amount").value);
    if (!selectedCategory || !selectedService || amt <= 0) return alert("Complete all inputs validly.");

    try {
        await fetch('/api/manageFinance', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                action: 'addTransaction',
                type: 'expense',
                category: selectedCategory.toUpperCase(),
                amount: amt,
                description: selectedService,
                date: new Date().toISOString().split("T")[0]
            })
        });
        document.getElementById("amount").value = "";
        loadExpenses();
    } catch (err) { console.error(err); }
}

async function dropRecord(id) {
    await fetch('/api/manageFinance', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'deleteTransaction', id: id })
    });
    loadExpenses();
}

function render() {
    const tbody = document.getElementById("table");
    tbody.innerHTML = "";
    data.forEach(i => {
        tbody.innerHTML += `<tr>
            <td>${i.category}</td>
            <td><span class="badge bg-danger">${i.description}</span></td>
            <td>Rs. ${Number(i.amount).toFixed(2)}</td>
            <td>${i.date.split("T")[0]}</td>
            <td><button class="btn btn-sm btn-outline-danger" onclick="dropRecord(${i.id})">Drop</button></td>
        </tr>`;
    });
    updateChart();
}

function updateChart() {
    let totals = {};
    data.forEach(i => { totals[i.description] = (totals[i.description] || 0) + Number(i.amount); });
    if (chart) chart
