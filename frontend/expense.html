<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Salon Expenses System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{ background:#f5f7fb; }

.category-card{
    background:white;
    border-radius:15px;
    padding:15px;
    box-shadow:0 2px 12px rgba(0,0,0,0.1);
    cursor:pointer;
    text-align:center;
}

.category-card:hover{ transform:scale(1.03); }

.service-box{
    background:#fff;
    padding:10px;
    border-radius:10px;
    margin:5px 0;
    border:1px solid #eee;
    cursor:pointer;
}

.service-box.active{
    background:#dc2626;
    color:white;
}

.right-box{
    background:white;
    padding:15px;
    border-radius:15px;
}

.table-box{
    background:white;
    padding:15px;
    border-radius:15px;
    margin-top:20px;
}

img{
    width:100%;
    height:100px;
    object-fit:cover;
    border-radius:10px;
}

</style>
</head>

<body>

<div class="container mt-4">

<div class="row">

<div class="col-md-8">

<h3>💸 Salon Expense Dashboard</h3>

<div class="row mt-3">

<div class="col-md-4">
<div class="category-card" onclick="selectCategory('inventory')">🧴 Inventories</div>
</div>

<div class="col-md-4">
<div class="category-card" onclick="selectCategory('bills')">🧾 Bills</div>
</div>

<div class="col-md-4">
<div class="category-card" onclick="selectCategory('others')">🍔 Others</div>
</div>

</div>

<div class="mt-4">

<h5>Select Expense Type</h5>

<div id="services"></div>

<input id="amount" class="form-control mt-2" placeholder="Amount">

<button class="btn btn-danger mt-3" onclick="addExpense()">
Add Expense
</button>

</div>

<div class="table-box mt-4">

<table class="table table-striped">
<thead>
<tr>
<th>Category</th>
<th>Type</th>
<th>Amount</th>
<th>Date</th>
<th>Action</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

</div>

</div>

<div class="col-md-4">
<div class="right-box">
<h5>Expense Chart</h5>
<canvas id="chart"></canvas>
</div>
</div>

</div>
</div>

<script>
/* ================= DATA ================= */
let data = JSON.parse(localStorage.getItem("salonExpense")) || [];

let table = document.getElementById("table");

let selectedCategory = "";
let selectedService = "";

/* ================= SERVICES ================= */
const services = {
inventory:["Shampoo","Soap","Oils","Hair Colors","Blades","Creams","Facial Items","Makeup Items"],
bills:["Water","Electricity","Rent","Internet"],
others:["Food","Transport","Other"]
};

/* ================= CATEGORY ================= */
function selectCategory(cat){

    selectedCategory = cat;

    let html = "";

    services[cat].forEach(s=>{
        html += `<div class="service-box" onclick="selectService('${s}',this)">${s}</div>`;
    });

    document.getElementById("services").innerHTML = html;

    selectedService = "";
}

/* ================= SERVICE ================= */
function selectService(service,el){

    selectedService = service;

    document.querySelectorAll(".service-box")
    .forEach(x => x.classList.remove("active"));

    el.classList.add("active");
}

/* ================= ADD ================= */
function addExpense(){

    if(!selectedCategory || !selectedService){
        alert("Select category and service");
        return;
    }

    let amount = Number(document.getElementById("amount").value);

    if(!amount || amount <= 0){
        alert("Enter valid amount");
        return;
    }

    let date = new Date().toISOString().split("T")[0];

    data.push({
        category:selectedCategory,
        type:selectedService,
        amount:amount,
        date:date
    });

    localStorage.setItem("salonExpense", JSON.stringify(data));

    render();
}

/* ================= RENDER ================= */
function render(){

    table.innerHTML = "";

    data.forEach((i,index)=>{

        table.innerHTML += `
        <tr>
        <td>${i.category}</td>
        <td>${i.type}</td>
        <td>${i.amount}</td>
        <td>${i.date}</td>
        <td>
            <button class="btn btn-warning btn-sm" onclick="edit(${index})">Edit</button>
            <button class="btn btn-danger btn-sm" onclick="del(${index})">Delete</button>
        </td>
        </tr>`;
    });

    updateChart();
}

/* ================= DELETE ================= */
function del(i){
    data.splice(i,1);
    localStorage.setItem("salonExpense", JSON.stringify(data));
    render();
}

/* ================= EDIT ================= */
function edit(i){

    let item = data[i];

    selectedCategory = item.category;
    selectedService = item.type;

    document.getElementById("amount").value = item.amount;

    selectCategory(item.category);

    data.splice(i,1);

    render();
}

/* ================= CHART ================= */
let chart;

function updateChart(){

    let totals = {};

    data.forEach(i=>{
        totals[i.type] = (totals[i.type] || 0) + Number(i.amount);
    });

    let labels = Object.keys(totals);
    let values = Object.values(totals);

    if(chart) chart.destroy();

    chart = new Chart(document.getElementById("chart"),{
        type:"pie",
        data:{
            labels:labels.length ? labels : ["No Data"],
            datasets:[{
                data:values.length ? values : [1]
            }]
        }
    });
}

render();
</script>

</body>
</html>
