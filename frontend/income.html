<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salon Income System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background:#f5f7fb; }
        .category-card { background:white; border-radius:12px; padding:15px; text-align:center; cursor:pointer; box-shadow:0 2px 8px rgba(0,0,0,0.05); transition: transform 0.2s; }
        .category-card:hover { transform: scale(1.03); }
        .service-box { background:#fff; padding:10px; border-radius:8px; margin:5px 0; border:1px solid #eee; cursor:pointer; }
        .service-box.active { background:#198754; color:white; }
    </style>
</head>
<body>
<div class="container mt-4">
    <div class="mb-3"><a href="dashboard.html" class="btn btn-secondary btn-sm">⬅ Dashboard</a></div>
    <div class="row">
        <div class="col-md-8">
            <h3>💰 Record Salon Income</h3>
            <div class="row mt-3">
                <div class="col-md-4"><div class="category-card" onclick="selectCategory('hair')">💇‍♂️ Hair Services</div></div>
                <div class="col-md-4"><div class="category-card" onclick="selectCategory('beauty')">💅 Beauty & Nails</div></div>
                <div class="col-md-4"><div class="category-card" onclick="selectCategory('treatments')">🌿 Treatments</div></div>
            </div>

            <div class="mt-4">
                <h5>Select Income Type</h5>
                <div id="services"></div>
                <input id="amount" type="number" class="form-control mt-2" placeholder="Amount Recieved (Rs.)">
                <button class="btn btn-success mt-3" onclick="addIncome()">Save Income</button>
            </div>

            <div class="bg-white p-3 rounded shadow-sm mt-4">
                <table class="table table-striped">
                    <thead><tr><th>Category</th><th>Service Type</th><th>Amount</th><th>Date</th><th>Action</th></tr></thead>
                    <tbody id="table"></tbody>
                </table>
            </div>
        </div>
        <div class="col-md-4">
            <div class="bg-white p-3 rounded shadow-sm">
                <h5>Income Streams Breakdown</h5>
                <canvas id="chart"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
let data = [];
let selectedCategory = "";
let selectedService = "";
let chart;

const services = {
    hair: ["Haircut", "Hair Coloring", "Hair Styling", "Shaving/Beard Trim", "Straightening"],
    beauty: ["Manicure", "Pedicure", "Facial Cleanup", "Bridal Makeup", "Eyebrow Threading"],
    treatments: ["Hair Spa", "Oil Massage", "Skin Treatment", "Keratin Treatment"]
};

function selectCategory(cat) {
    selectedCategory = cat;
    let html = "";
    services[cat].forEach(s => { html += `<div class="service-box" onclick="selectService('${s}', this)">${s}</div>`; });
    document.getElementById("services").innerHTML = html;
    selectedService = "";
}

function selectService(service, el) {
    selectedService = service;
    document.querySelectorAll(".service-box").forEach(x => x.classList.remove("active"));
    el.classList.add("active");
}

async function loadIncome() {
    try {
        const res = await fetch('/api/manageFinance');
        const transactions = await res.json();
        // Filter out only the "income" records coming live from Azure MySQL database rows
        data = transactions.filter(t => t.type === 'income');
        render();
    } catch (err) { console.error("Error loading income tables:", err); }
}

async function addIncome() {
    const amt = Number(document.getElementById("amount").value);
    if (!selectedCategory || !selectedService || amt <= 0) return alert("Please select a service type and enter a valid dynamic amount.");

    try {
        await fetch('/api/manageFinance', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                action: 'addTransaction',
                type: 'income',
                category: selectedCategory.toUpperCase(),
                amount: amt,
                description: selectedService,
                date: new Date().toISOString().split("T")[0]
            })
        });
        document.getElementById("amount").value = "";
        loadIncome(); // Sync table layout instantly
    } catch (err) { console.error("Failed uploading income stream:", err); }
}

async function dropRecord(id) {
    if (!confirm("Remove this entry completely from cloud logs?")) return;
    await fetch('/api/manageFinance', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'deleteTransaction', id: id })
    });
    loadIncome();
}

function render() {
    const tbody = document.getElementById("table");
    tbody.innerHTML = "";
    if (data.length === 0) {
        tbody.innerHTML = `<tr><td colspan="5" class="text-center text-muted">No income records posted today.</td></tr>`;
        updateChart();
        return;
    }
    data.forEach(i => {
        tbody.innerHTML += `<tr>
            <td>${i.category}</td>
            <td><span class="badge bg-success">${i.description}</span></td>
            <td>Rs. ${Number(i.amount).toFixed(2)}</td>
            <td>${i.date.split("T")[0]}</td>
            <td><button class="btn btn-sm btn-outline-danger" onclick="dropRecord(${i.id})">Drop</button></td>
        </tr>`;
    });
    updateChart();
}

function updateChart() {
    let totals = {};
    data.forEach(i => { totals[i.description] = (totals[i.description] || 0) + Number(i.amount); });
    if (chart) chart.destroy();
    chart = new Chart(document.getElementById("chart"), {
        type: "pie",
        data: {
            labels: Object.keys(totals),
            datasets: [{ data: Object.values(totals), backgroundColor: ['#2ec4b6', '#a7c957', '#ffb703', '#4bc0c0', '#9b5de5'] }]
        }
    });
}

window.addEventListener("load", loadIncome);
</script>
</body>
</html>
