<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SalonLedger - Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">


<style>

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#111827,#4f46e5);
    font-family:'Segoe UI',sans-serif;
}

/* Background circles */
body::before{
    content:"";
    position:absolute;
    width:250px;
    height:250px;
    border-radius:50%;
    background:rgba(255,255,255,0.08);
    top:30px;
    left:30px;
}

body::after{
    content:"";
    position:absolute;
    width:200px;
    height:200px;
    border-radius:50%;
    background:rgba(255,255,255,0.08);
    bottom:30px;
    right:30px;
}

/* Register Card */

.register-box{
    width:430px;
    background:white;
    border-radius:20px;
    padding:35px;
    box-shadow:0 15px 40px rgba(0,0,0,0.15);
    z-index:2;
    animation:slideUp .7s ease;
}

@keyframes slideUp{
    from{
        opacity:0;
        transform:translateY(40px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* Logo */

.logo-circle{
    width:100px;
    height:100px;
    border-radius:50%;
    background:#eef2ff;
    color:#4f46e5;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:50px;
    margin:auto;
}

.brand{
    font-size:32px;
    font-weight:700;
    color:#111827;
}

.tagline{
    color:#64748b;
    font-size:15px;
}

/* Inputs */

.input-group-text{
    background:#eef2ff;
    color:#4f46e5;
    border:none;
}

.form-control{
    border-left:none;
}

.form-control:focus{
    box-shadow:none;
}

/* Button */

.btn-register{
    background:#4f46e5;
    color:white;
    border:none;
    padding:12px;
    border-radius:10px;
    font-weight:600;
}

.btn-register:hover{
    background:#3730a3;
    color:white;
}

</style>

</head>
<body>

<div class="register-box">

<div class="text-center">

<div class="logo-circle">
✂️
</div>

<h1 class="brand mt-3">SalonLedger</h1>

<p class="tagline">
Smart Financial Management for Modern Salons
</p>

<h4 class="mt-4">Create Account</h4>

</div>

<div class="input-group mt-4">
<span class="input-group-text">
<i class="bi bi-envelope-fill"></i>
</span>
<input
id="email"
type="email"
class="form-control"
placeholder="Enter Email">
</div>

<div class="input-group mt-3">
<span class="input-group-text">
<i class="bi bi-lock-fill"></i>
</span>
<input
id="password"
type="password"
class="form-control"
placeholder="Create Password">
</div>

<button class="btn btn-register w-100 mt-4" onclick="register()">
Create Account
</button>

<p class="text-center mt-3 mb-0">
Already have an account?
<a href="login.html">Login</a>
</p>

</div>

<script src="app.js"></script>


</body>
</html>
